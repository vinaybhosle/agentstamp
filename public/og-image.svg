<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#22d3ee"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Glow circles -->
  <circle cx="200" cy="315" r="250" fill="#22d3ee" opacity="0.03"/>
  <circle cx="1000" cy="315" r="250" fill="#a78bfa" opacity="0.03"/>

  <!-- Stamp icon -->
  <g transform="translate(540, 100)">
    <rect x="0" y="0" width="120" height="120" rx="24" fill="none" stroke="url(#titleGrad)" stroke-width="3" opacity="0.6"/>
    <text x="60" y="82" font-family="serif" font-size="64" fill="url(#titleGrad)" text-anchor="middle">🔏</text>
  </g>

  <!-- Title -->
  <text x="600" y="290" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="-2">AgentStamp</text>

  <!-- Tagline -->
  <text x="600" y="345" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="1">Stamp your agent into existence.</text>

  <!-- Feature pills -->
  <g transform="translate(600, 400)" text-anchor="middle">
    <!-- Stamp pill -->
    <rect x="-340" y="-20" width="180" height="44" rx="22" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
    <text x="-250" y="8" font-family="'JetBrains Mono', monospace" font-size="16" fill="#22d3ee">🪪 Identity</text>

    <!-- Registry pill -->
    <rect x="-100" y="-20" width="200" height="44" rx="22" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="8" font-family="'JetBrains Mono', monospace" font-size="16" fill="#a78bfa">📋 Registry</text>

    <!-- Well pill -->
    <rect x="160" y="-20" width="200" height="44" rx="22" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.5"/>
    <text x="260" y="8" font-family="'JetBrains Mono', monospace" font-size="16" fill="#6ee7b7">🌟 Wishing Well</text>
  </g>

  <!-- Tech bar -->
  <rect x="350" y="480" width="500" height="36" rx="18" fill="url(#accentGrad)"/>
  <text x="600" y="504" font-family="'JetBrains Mono', monospace" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="3">x402  ·  BASE  ·  USDC  ·  Ed25519</text>

  <!-- Domain -->
  <text x="600" y="575" font-family="'JetBrains Mono', monospace" font-size="18" fill="#475569" text-anchor="middle">agentstamp.org</text>
</svg>
